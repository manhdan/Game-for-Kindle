<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, minimum-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>5 Games</title>
<style>
/* ═══════════════════════ BASE ═══════════════════════ */
* { box-sizing: border-box; margin: 0; padding: 0; }
html, body {
  width: 100%; height: 100%;
  overflow: hidden;
  background: #fff;
  -webkit-user-select: none; user-select: none;
}

/* ═══════════════════════ TAB BAR ═══════════════════════ */
#g-tabs {
  position: absolute;
  top: 0; left: 0;
  width: 100%; height: 44px;
  overflow: hidden;
  border-bottom: 4px solid #000;
  background: #fff;
  z-index: 100;
}
.g-tab {
  float: left;
  width: 20%; height: 44px;
  line-height: 40px;
  text-align: center;
  font-family: Georgia, serif;
  font-size: 0.72rem;
  font-weight: bold;
  text-transform: uppercase;
  cursor: pointer;
  border-right: 3px solid #000;
  background: #fff; color: #000;
  overflow: hidden;
}
.g-tab:last-child { border-right: none; }
.g-tab.active     { background: #000; color: #fff; }
.g-tab:active     { opacity: 0.7; }

/* ═══════════════════════ GAME PANELS ═══════════════════════ */
#g-panels {
  position: absolute;
  top: 44px; left: 0; right: 0; bottom: 0;
  overflow: hidden;
}
.gpanel {
  display: none;
  position: absolute;
  top: 0; left: 0;
  width: 100%; height: 100%;
  overflow: hidden;
}
.gpanel.active { display: block; }

/* ═══════════════════════════════════════
   BATTLESHIPS 1
   ═══════════════════════════════════════ */
#panel-bs1 #bs1-wrap {
  font-family: Arial, Helvetica, sans-serif;
  color: #000; background: #fff; position: absolute;
}
#panel-bs1 .bs1-hdr { overflow: hidden; margin-bottom: 4px; }
#panel-bs1 .bs1-hbtn {
  float: left; border: 3px solid #000; border-right: none;
  text-align: center; cursor: pointer;
  font-family: Arial, Helvetica, sans-serif; font-weight: bold;
  text-transform: uppercase; background: #fff; color: #000;
  line-height: 1.2; font-size: 1rem; padding: 10px 2px;
}
#panel-bs1 .bs1-hbtn:last-child { border-right: 3px solid #000; }
#panel-bs1 .bs1-hbtn.active  { background: #000; color: #fff; }
#panel-bs1 .bs1-hbtn:active  { background: #555; color: #fff; }
#panel-bs1 .bs1-hbtn.newbtn  { background: #000; color: #fff; }
#panel-bs1 .bs1-hbtn.newbtn:active { background: #444; color: #fff; }
#panel-bs1 .bs1-bwrap { position: relative; }
#panel-bs1 #bs1-canvas { display: block; cursor: pointer; }
#panel-bs1 #bs1-overlay { display: none; position: absolute; top: 0; left: 0; z-index: 10; }
#panel-bs1 #bs1-overlay.show { display: block; }
#panel-bs1 #bs1-win-box {
  position: absolute; background: #fff; color: #000;
  text-align: center; cursor: pointer;
  font-weight: bold; font-family: Arial, Helvetica, sans-serif; line-height: 1.5;
}

/* ═══════════════════════════════════════
   BATTLESHIPS 2
   ═══════════════════════════════════════ */
#panel-bs2 #bs2-wrap { position: absolute; background: #fff; left: 0; top: 0; }
#panel-bs2 .bs2-hrow { overflow: hidden; }
#panel-bs2 .bs2-hbtn {
  float: left; border: 2px solid #000; border-right: none;
  text-align: center; cursor: pointer;
  font-family: Arial, sans-serif; font-weight: bold;
  text-transform: uppercase; background: #fff; color: #000;
  line-height: 1.1; padding: 9px 2px; font-size: 0.88rem;
}
#panel-bs2 .bs2-hbtn:last-child { border-right: 2px solid #000; }
#panel-bs2 .bs2-hbtn.on { background: #000; color: #fff; }
#panel-bs2 .bs2-hbtn.nb { background: #111; color: #fff; border-color: #111; }
#panel-bs2 .bs2-hbtn:active { opacity: 0.55; }
#panel-bs2 #bs2-pst {
  text-align: center; font-size: 0.78rem;
  padding: 3px 6px; white-space: nowrap; overflow: hidden;
  text-overflow: ellipsis; border-bottom: 1px solid #ccc;
  background: #f4f4f4; font-family: Arial, sans-serif;
}
#panel-bs2 canvas { display: block; }
#panel-bs2 #bs2-pov {
  display: none; position: absolute; top: 0; left: 0; right: 0; bottom: 0;
  background: rgba(255,255,255,0.9); z-index: 20; cursor: pointer;
}
#panel-bs2 #bs2-pov.show { display: block; }
#panel-bs2 #bs2-pwb {
  position: absolute; top: 50%; left: 50%;
  -webkit-transform: translate(-50%,-50%); transform: translate(-50%,-50%);
  background: #fff; text-align: center; padding: 26px 18px;
  font-size: 1.12rem; font-weight: bold;
  font-family: Arial, sans-serif; line-height: 1.7;
  min-width: 200px; max-width: 88%;
}

/* ═══════════════════════════════════════
   NONOGRAM
   ═══════════════════════════════════════ */
#panel-ng #ng-wrap {
  position: absolute; left: 0; top: 0; width: 1006px;
  border: 3px solid #000;
  -webkit-transform-origin: 0 0; transform-origin: 0 0;
  background: #fff; color: #000;
  font-family: Georgia, 'Times New Roman', serif;
  -webkit-text-size-adjust: 100%;
}
#panel-ng #ng-top-bar {
  display: block; overflow: hidden; width: 1000px; border-bottom: 4px solid #000;
}
#panel-ng .ng-szbtn {
  float: left; width: 100px; text-align: center;
  font-family: Georgia, serif; font-size: 0.85rem; font-weight: bold;
  cursor: pointer; border-right: 3px solid #000;
  background: #fff; color: #000;
  border-top: none; border-bottom: none; border-left: none; padding: 0;
}
#panel-ng .ng-szbtn.active { background: #000; color: #fff; }
#panel-ng .ng-szbtn:active { opacity: 0.7; }
#panel-ng #ng-dtw {
  float: left; width: 200px; text-align: center; border-right: 3px solid #000;
}
#panel-ng .ng-tval { font-size: 1.2rem; font-weight: bold; font-family: 'Courier New', monospace; }
#panel-ng .ng-topbtn {
  float: left; width: 200px; text-align: center;
  font-family: Georgia, serif; font-size: 0.85rem; font-weight: bold;
  text-transform: uppercase; letter-spacing: 1px; cursor: pointer;
  border-right: 3px solid #000;
  border-top: none; border-bottom: none; border-left: none; padding: 0;
  background: #000; color: #fff;
}
#panel-ng .ng-topbtn:active { background: #444; }
#panel-ng .ng-topbtn:last-child { border-right: none; }
#panel-ng #ng-board-outer { position: relative; width: 1000px; }
#panel-ng #ng-board { position: absolute; left: 0; top: 0; width: 1000px; }
#panel-ng .ng-clue { position: absolute; background: #e8eaf0; display: block; overflow: hidden; text-align: center; }
#panel-ng .ng-clue-inner { position: absolute; left: 0; top: 0; width: 100%; height: 100%; display: block; overflow: hidden; }
#panel-ng .ng-clue-num { display: block; font-family: 'Arial Black', Arial, sans-serif; font-weight: 900; color: #000; text-align: center; line-height: 1; }
#panel-ng .ng-cell {
  position: absolute; background: #fff;
  border-left: 1px solid #bbb; border-top: 1px solid #bbb; cursor: pointer;
}
#panel-ng .ng-cell:active { opacity: 0.7; }
#panel-ng .ng-cell.filled { background: #1a1a2e; }
#panel-ng .ng-cell.marked { background: #fff; }
#panel-ng .ng-cell.marked:before, #panel-ng .ng-cell.marked:after {
  content: ''; position: absolute; top: 50%; left: 50%;
  width: 55%; height: 3px; background: #888; margin-top: -1px; margin-left: -27.5%;
}
#panel-ng .ng-cell.marked:before { -webkit-transform: rotate(45deg); transform: rotate(45deg); }
#panel-ng .ng-cell.marked:after  { -webkit-transform: rotate(-45deg); transform: rotate(-45deg); }
#panel-ng .ng-cell.thick-right  { border-right: 2px solid #666; }
#panel-ng .ng-cell.thick-bottom { border-bottom: 2px solid #666; }
#panel-ng #ng-frame { position: absolute; border: 3px solid #000; pointer-events: none; }
#panel-ng #ng-winov { display: none; position: absolute; left: 0; top: 0; width: 1000px; background: transparent; text-align: center; }
#panel-ng #ng-winov.show { display: block; }
#panel-ng #ng-winbox {
  display: inline-block; background: #fff; color: #000;
  padding: 40px 60px; font-size: 1.6rem; font-weight: bold;
  font-family: Georgia, serif; line-height: 1.5; cursor: pointer;
}
#panel-ng #ng-winbox .win-sub { display: block; font-size: 0.95rem; font-weight: normal; margin-top: 10px; letter-spacing: 1px; }

/* ═══════════════════════════════════════
   DOMINOSA
   ═══════════════════════════════════════ */
#panel-dm #dm-wrap {
  position: absolute; left: 0; top: 0; width: 1006px;
  border: 3px solid #000;
  -webkit-transform-origin: 0 0; transform-origin: 0 0;
  background: #fff; color: #000;
  font-family: Georgia, 'Times New Roman', serif;
  -webkit-text-size-adjust: 100%;
}
#panel-dm #dm-top-bar {
  display: block; overflow: hidden; width: 1000px; border-bottom: 4px solid #000;
}
#panel-dm .dm-szbtn {
  float: left; width: 100px; text-align: center;
  font-family: Georgia, serif; font-size: 0.95rem; font-weight: bold;
  cursor: pointer; border-right: 3px solid #000;
  background: #fff; color: #000;
  border-top: none; border-bottom: none; border-left: none; padding: 0;
}
#panel-dm .dm-szbtn.active { background: #000; color: #fff; }
#panel-dm .dm-szbtn:active { opacity: 0.7; }
#panel-dm #dm-dtw {
  float: left; width: 200px; text-align: center; border-right: 3px solid #000;
}
#panel-dm .dm-tval { font-size: 1.2rem; font-weight: bold; font-family: 'Courier New', monospace; }
#panel-dm .dm-topbtn {
  float: left; width: 200px; text-align: center;
  font-family: Georgia, serif; font-size: 0.85rem; font-weight: bold;
  text-transform: uppercase; letter-spacing: 1px; cursor: pointer;
  border-right: 3px solid #000;
  border-top: none; border-bottom: none; border-left: none; padding: 0;
  background: #000; color: #fff;
}
#panel-dm .dm-topbtn:active { background: #444; }
#panel-dm .dm-topbtn:last-child { border-right: none; }
#panel-dm #dm-board-outer { position: relative; width: 1000px; }
#panel-dm #dom-board { position: absolute; left: 0; top: 0; width: 1000px; height: 1000px; }
#panel-dm .dc {
  position: absolute; cursor: pointer;
  border-left: 2px solid #ccc; border-top: 2px solid #ccc;
  border-right: none; border-bottom: none; background: #fff;
}
#panel-dm .dc:active { opacity: 0.7; }
#panel-dm .dc-inner {
  position: absolute; text-align: center;
  font-family: 'Arial Black', Arial, sans-serif; font-weight: 900;
  background: #fff; color: #000; border-radius: 0; overflow: hidden;
}
#panel-dm .dc.hi1      .dc-inner { background: #000; color: #fff; border-radius: 50%; }
#panel-dm .dc.conflict .dc-inner { background: #666; color: #fff; border-radius: 50%; }
#panel-dm .dc.paired   .dc-inner { background: #111; color: #fff; }
#panel-dm .dc.d-hl .dc-inner { border-radius: 40% 0 0 40%; }
#panel-dm .dc.d-hr .dc-inner { border-radius: 0 40% 40% 0; border-left: 3px solid #fff; }
#panel-dm .dc.d-vt .dc-inner { border-radius: 40% 40% 0 0; }
#panel-dm .dc.d-vb .dc-inner { border-radius: 0 0 40% 40%; border-top: 3px solid #fff; }
#panel-dm #dm-winov {
  display: none; position: absolute; left: 0; top: 0;
  width: 1000px; height: 1000px; background: transparent; text-align: center;
}
#panel-dm #dm-winov.show { display: block; }
#panel-dm #dm-winbox {
  display: inline-block; background: #fff; color: #000; margin-top: 360px;
  padding: 40px 60px; font-size: 1.6rem; font-weight: bold;
  font-family: Georgia, serif; line-height: 1.5; cursor: pointer;
}
#panel-dm #dm-winbox .win-sub { display: block; font-size: 0.95rem; font-weight: normal; margin-top: 10px; letter-spacing: 1px; }

/* ═══════════════════════════════════════
   PIPES
   ═══════════════════════════════════════ */
#panel-pp #pp-wrap {
  width: 1000px;
  -webkit-transform-origin: top left; transform-origin: top left;
  font-family: Georgia, 'Times New Roman', serif; color: #000; background: #fff;
  position: absolute;
}
#panel-pp .pp-header { width: 1000px; overflow: hidden; margin-bottom: 4px; }
#panel-pp .pp-hbtn {
  float: left; width: 200px; border: 3px solid #000; border-right: none;
  text-align: center; cursor: pointer; font-family: Georgia, serif;
  font-weight: bold; text-transform: uppercase; background: #fff; color: #000;
  line-height: 1.2; font-size: 1rem; padding: 10px 2px;
}
#panel-pp .pp-hbtn:last-child { border-right: 3px solid #000; }
#panel-pp .pp-hbtn.active { background: #000; color: #fff; }
#panel-pp .pp-hbtn:active { opacity: 0.7; }
#panel-pp .pp-hbtn.newbtn { background: #000; color: #fff; }
#panel-pp .pp-hbtn.newbtn:active { background: #444; }
#panel-pp .pp-bwrap {
  width: 1000px; height: 1000px; border: 3px solid #000; overflow: hidden; position: relative;
}
#panel-pp #pipes-canvas { display: block; width: 1000px; height: 1000px; cursor: pointer; }
#panel-pp #pp-overlay { display: none; position: absolute; top: 0; left: 0; width: 1000px; height: 1000px; z-index: 10; }
#panel-pp #pp-overlay.show { display: block; }
#panel-pp #pp-win-box {
  position: absolute; top: 50%; left: 50%;
  width: 500px; margin-left: -250px; margin-top: -90px;
  background: #fff; color: #000; text-align: center; cursor: pointer;
  padding: 36px 20px; font-size: 1.5rem; font-weight: bold;
  font-family: Georgia, serif; line-height: 1.6;
}
</style>
</head>
<body>

<!-- ══════════════ TAB BAR ══════════════ -->
<div id="g-tabs">
  <div class="g-tab active" id="gtab-bs1" onclick="gTab('bs1')">Ships&nbsp;1</div>
  <div class="g-tab"        id="gtab-bs2" onclick="gTab('bs2')">Ships&nbsp;2</div>
  <div class="g-tab"        id="gtab-ng"  onclick="gTab('ng')">Nonogram</div>
  <div class="g-tab"        id="gtab-dm"  onclick="gTab('dm')">Dominosa</div>
  <div class="g-tab"        id="gtab-pp"  onclick="gTab('pp')">Pipes</div>
</div>

<!-- ══════════════ GAME PANELS ══════════════ -->
<div id="g-panels">

<!-- ════════ BATTLESHIPS 1 ════════ -->
<div class="gpanel active" id="panel-bs1">
  <div id="bs1-wrap">
    <div class="bs1-hdr">
      <div class="bs1-hbtn active" id="bs1-lvl-6"  onclick="bsSetLevel('6x6')">6x6</div>
      <div class="bs1-hbtn"        id="bs1-lvl-6h" onclick="bsSetLevel('6x6H')">6x6H</div>
      <div class="bs1-hbtn"        id="bs1-lvl-8"  onclick="bsSetLevel('8x8')">8x8</div>
      <div class="bs1-hbtn"        id="bs1-timer">00:00</div>
      <div class="bs1-hbtn newbtn" onclick="bsNewGame()">New</div>
    </div>
    <div class="bs1-bwrap" id="bs1-bwrap">
      <canvas id="bs1-canvas"></canvas>
      <div id="bs1-overlay">
        <div id="bs1-win-box" onclick="bsNewGame()"></div>
      </div>
    </div>
    <canvas id="bs1-tray" style="display:block;margin:4px auto 0 auto;"></canvas>
  </div>
</div>

<!-- ════════ BATTLESHIPS 2 ════════ -->
<div class="gpanel" id="panel-bs2">
  <div id="bs2-wrap">
    <div class="bs2-hrow" id="bs2-hdr">
      <div class="bs2-hbtn on" id="bs2-lv6" onclick="bs2SetLv('6')">6x6</div>
      <div class="bs2-hbtn"    id="bs2-lv7" onclick="bs2SetLv('7')">7x7</div>
      <div class="bs2-hbtn"    id="bs2-lv8" onclick="bs2SetLv('8')">8x8</div>
      <div class="bs2-hbtn"    id="bs2-hb4">00:00</div>
      <div class="bs2-hbtn"    id="bs2-hb5" onclick="bs2DoShuffle()">&#8635; X&#225;o</div>
    </div>
    <div id="bs2-pst">status</div>
    <canvas id="bs2-acv"></canvas>
    <canvas id="bs2-pcv"></canvas>
    <div id="bs2-pov"><div id="bs2-pwb" onclick="bs2NewGame()">...</div></div>
  </div>
</div>

<!-- ════════ NONOGRAM ════════ -->
<div class="gpanel" id="panel-ng">
  <div id="ng-wrap">
    <div id="ng-top-bar">
      <div class="ng-szbtn active" id="sz-easy"   onclick="nSetDiff('easy')">Easy</div>
      <div class="ng-szbtn"        id="sz-medium" onclick="nSetDiff('medium')">Medium</div>
      <div class="ng-szbtn"        id="sz-hard"   onclick="nSetDiff('hard')">Hard</div>
      <div class="ng-szbtn"        id="sz-expert" onclick="nSetDiff('expert')">Expert</div>
      <div id="ng-dtw"><span class="ng-tval" id="ng-d-timer">00:00</span></div>
      <div class="ng-topbtn" onclick="nReset()">Reset</div>
      <div class="ng-topbtn" onclick="nNewGame()">NEW</div>
    </div>
    <div id="ng-board-outer">
      <div id="ng-board"></div>
      <div id="ng-frame"></div>
      <div id="ng-winov" onclick="nNewGame()">
        <div id="ng-winbox">
          <span id="ng-win-msg">Mission complete!</span>
          <span class="win-sub" id="ng-win-time"></span>
          <span class="win-sub">&nbsp;</span>
        </div>
      </div>
    </div>
  </div>
</div>

<!-- ════════ DOMINOSA ════════ -->
<div class="gpanel" id="panel-dm">
  <div id="dm-wrap">
    <div id="dm-top-bar">
      <div class="dm-szbtn active" id="sz-3" onclick="dSetSize(3)">3&times;3</div>
      <div class="dm-szbtn"        id="sz-4" onclick="dSetSize(4)">4&times;4</div>
      <div class="dm-szbtn"        id="sz-5" onclick="dSetSize(5)">5&times;5</div>
      <div class="dm-szbtn"        id="sz-6" onclick="dSetSize(6)">6&times;6</div>
      <div id="dm-dtw"><span class="dm-tval" id="dm-d-timer">00:00</span></div>
      <div class="dm-topbtn" onclick="dReset()">Reset</div>
      <div class="dm-topbtn" onclick="dNewGame()">NEW</div>
    </div>
    <div id="dm-board-outer">
      <div id="dom-board"></div>
      <div id="dm-winov" onclick="dNewGame()">
        <div id="dm-winbox">
          <span id="dm-win-msg">Mission complete!</span>
          <span class="win-sub" id="dm-win-time"></span>
          <span class="win-sub">&nbsp;</span>
        </div>
      </div>
    </div>
  </div>
</div>

<!-- ════════ PIPES ════════ -->
<div class="gpanel" id="panel-pp">
  <div id="pp-wrap">
    <div class="pp-header">
      <div class="pp-hbtn active" id="pp-lvl-4" onclick="pSetLevel(4)">4x4</div>
      <div class="pp-hbtn"        id="pp-lvl-5" onclick="pSetLevel(5)">5x5</div>
      <div class="pp-hbtn"        id="pp-lvl-6" onclick="pSetLevel(6)">6x6</div>
      <div class="pp-hbtn"        id="pp-timer">00:00</div>
      <div class="pp-hbtn newbtn" onclick="pNewGame()">New</div>
    </div>
    <div class="pp-bwrap">
      <canvas id="pipes-canvas" width="1000" height="1000"></canvas>
      <div id="pp-overlay">
        <div id="pp-win-box" onclick="pNewGame()"></div>
      </div>
    </div>
  </div>
</div>

</div><!-- #g-panels -->

<script>
/* ════════════════════════════════════════════════════════
   GLOBAL TAB SYSTEM
   ════════════════════════════════════════════════════════ */
var G_TAB_H = 44;
var gCurrentTab = 'bs1';
var gInitialized = { bs1: true, bs2: false, ng: false, dm: false, pp: false };

function gPanelH() {
  return (window.innerHeight || document.documentElement.clientHeight) - G_TAB_H;
}

function gTab(id) {
  if (id === gCurrentTab) return;
  gCurrentTab = id;
  var ids = ['bs1','bs2','ng','dm','pp'];
  for (var i = 0; i < ids.length; i++) {
    var p = document.getElementById('panel-' + ids[i]);
    var t = document.getElementById('gtab-'  + ids[i]);
    if (p) p.className = 'gpanel' + (ids[i] === id ? ' active' : '');
    if (t) t.className = 'g-tab'  + (ids[i] === id ? ' active' : '');
  }
  if (!gInitialized[id]) {
    gInitialized[id] = true;
    if      (id === 'bs2') { bs2NewGame(); }
    else if (id === 'ng')  { ngApplyBarHeight(); nNewGame(); }
    else if (id === 'dm')  { dmApplyBarHeight(); dNewGame(); }
    else if (id === 'pp')  { ppResize(); pNewGame(); }
  } else {
    if      (id === 'bs1') { bsResize(); bsDraw(); }
    else if (id === 'bs2') { bs2Resize(); bs2DrawAll(); }
    else if (id === 'ng')  { ngApplyScale(); }
    else if (id === 'dm')  { dmApplyScale(); }
    else if (id === 'pp')  { ppResize(); ppDraw(); }
  }
}

if (window.addEventListener) {
  window.addEventListener('resize', function() {
    if      (gCurrentTab==='bs1') { bsResize(); bsDraw(); }
    else if (gCurrentTab==='bs2') { bs2Resize(); bs2DrawAll(); }
    else if (gCurrentTab==='ng')  { ngApplyScale(); }
    else if (gCurrentTab==='dm')  { dmApplyScale(); }
    else if (gCurrentTab==='pp')  { ppResize(); ppDraw(); }
  }, false);
  window.addEventListener('orientationchange', function() {
    setTimeout(function() {
      if      (gCurrentTab==='bs1') { bsResize(); bsDraw(); }
      else if (gCurrentTab==='bs2') { bs2Resize(); bs2DrawAll(); }
      else if (gCurrentTab==='ng')  { ngApplyScale(); }
      else if (gCurrentTab==='dm')  { dmApplyScale(); }
      else if (gCurrentTab==='pp')  { ppResize(); ppDraw(); }
    }, 100);
  }, false);
}

/* ════════════════════════════════════════════════════════
   BATTLESHIPS 1
   ════════════════════════════════════════════════════════ */
(function(){
var PANEL = document.getElementById('panel-bs1');
var EMPTY=0, SHIP=1;
var bsLevel='6x6', bsN=6, bsGrid=[], bsView=[], bsLocked=[];

function bsMakeEmptyGrid(n){var g=[];for(var i=0;i<n*n;i++)g.push(0);return g;}
function bsCanPlace(grid,n,r,c,len,horiz){
  var i,sr,sc,dr,dc,nr,nc;

  return true;
}
function bsPlaceShip(grid,n,r,c,len,horiz){for(var i=0;i<len;i++){var sr=horiz?r:r+i;var sc=horiz?c+i:c;grid[sr*n+sc]=SHIP;}}
function bsGeneratePuzzle(n,fleet){
  var ships=[];for(var fi=0;fi<fleet.length;fi++)for(var ci=0;ci<fleet[fi].count;ci++)ships.push(fleet[fi].len);

    var grid=bsMakeEmptyGrid(n);var ok=true;
    for(var si=0;si<ships.length;si++){var len=ships[si];var placed=false;
      for(var tries=0;tries<200;tries++){var horiz=Math.random()<0.5;var r=Math.floor(Math.random()*n);var c=Math.floor(Math.random()*n);if(bsCanPlace(grid,n,r,c,len,horiz)){bsPlaceShip(grid,n,r,c,len,horiz);placed=true;break;}}

}
function bsComputeClues(grid,n){

  for(r=0;r<n;r++){cnt=0;for(c=0;c<n;c++)if(grid[r*n+c]===SHIP)cnt++;rows.push(cnt);}
  for(c=0;c<n;c++){cnt=0;for(r=0;r<n;r++)if(grid[r*n+c]===SHIP)cnt++;cols.push(cnt);}
  return{rows:rows,cols:cols};
}
function bsCountShips(grid,n){
  var visited=[];for(var i=0;i<n*n;i++)visited.push(false);var counts={};
  for(var i2=0;i2<n*n;i2++){if(grid[i2]!==SHIP||visited[i2])continue;var r0=Math.floor(i2/n),c0=i2%n;
    if((r0>0&&grid[(r0-1)*n+c0]===SHIP)||(c0>0&&grid[r0*n+c0-1]===SHIP)){visited[i2]=true;continue;}
    var lenH=1;while(c0+lenH<n&&grid[r0*n+c0+lenH]===SHIP)lenH++;
    var lenV=1;while(r0+lenV<n&&grid[(r0+lenV)*n+c0]===SHIP)lenV++;
    var horiz2=lenH>1;var shipLen=horiz2?lenH:lenV;
    for(var si2=0;si2<shipLen;si2++){if(horiz2)visited[r0*n+c0+si2]=true;else visited[(r0+si2)*n+c0]=true;}
    counts[shipLen]=(counts[shipLen]||0)+1;}

}
function bsPickLocked(grid,n,level){
  var locked=[];for(var i=0;i<n*n;i++)locked.push(false);
  var pct=(level==='6x6')?0.20:(level==='6x6H')?0.10:0.15;
  var shipCells=[];for(var i2=0;i2<n*n;i2++)if(grid[i2]===SHIP)shipCells.push(i2);
  for(var j=shipCells.length-1;j>0;j--){var k=Math.floor(Math.random()*(j+1));var tmp=shipCells[j];shipCells[j]=shipCells[k];shipCells[k]=tmp;}
  var count=Math.max(1,Math.round(shipCells.length*pct));count=Math.min(count,shipCells.length);
  for(var h=0;h<count;h++)locked[shipCells[h]]=true;

function bsCheckWin(){

  for(var i=0;i<bsN*bsN;i++){if(bsView[i]!==SHIP)continue;var ri=Math.floor(i/bsN),ci=i%bsN;

      if(ddr!==0&&ddc!==0&&bsView[nr*bsN+nc]===SHIP)return false;}}}

}

function bsDrawAllShips(){

    var lenH=1;while(c0+lenH<n&&bsView[r0*n+c0+lenH]===SHIP)lenH++;
    var lenV=1;while(r0+lenV<n&&bsView[(r0+lenV)*n+c0]===SHIP)lenV++;
    var lShape=(lenH>1&&lenV>1);var horiz=lShape?true:(lenH>1);var shipLen=horiz?lenH:lenV;

function bsRoundRect(ctx,x,y,w,h,r){if(w<2*r)r=w/2;if(h<2*r)r=h/2;ctx.beginPath();ctx.moveTo(x+r,y);ctx.lineTo(x+w-r,y);ctx.quadraticCurveTo(x+w,y,x+w,y+r);ctx.lineTo(x+w,y+h-r);ctx.quadraticCurveTo(x+w,y+h,x+w-r,y+h);ctx.lineTo(x+r,y+h);ctx.quadraticCurveTo(x,y+h,x,y+h-r);ctx.lineTo(x,y+r);ctx.quadraticCurveTo(x,y,x+r,y);ctx.closePath();}

function bsOnClick(e){

  while(stack.length){var cur=stack[stack.length-1];var r=Math.floor(cur/n),c=cur%n;var nb=[];for(var d=0;d<4;d++){var nr=r+DR[d],nc=c+DC[d];if(nr>=0&&nr<n&&nc>=0&&nc<n){var ni=nr*n+nc;if(!visited[ni])nb.push({ni:ni,d:d,nr:nr,nc:nc});}}if(!nb.length){stack.pop();continue;}var pick=nb[Math.floor(Math.random()*nb.length)];visited[pick.ni]=true;stack.push(pick.ni);edges.push({r1:r,c1:c,r2:pick.nr,c2:pick.nc,d:pick.d});}
  var op=[];for(i=0;i<n*n;i++)op.push([0,0,0,0]);for(i=0;i<edges.length;i++){var e=edges[i];op[e.r1*n+e.c1][e.d]=1;op[e.r2*n+e.c2][(e.d+2)%4]=1;}
  var grid=[];for(i=0;i<n*n;i++){var o=op[i],sum=o[0]+o[1]+o[2]+o[3],type,rot;if(sum<=1){type='end';rot=0;if(sum===1)for(rot=0;rot<4;rot++)if(o[rot])break;}else if(sum===2){if(o[0]&&o[2]){type='straight';rot=0;}else if(o[1]&&o[3]){type='straight';rot=1;}else{type='elbow';if(o[0]&&o[1])rot=0;else if(o[1]&&o[2])rot=1;else if(o[2]&&o[3])rot=2;else rot=3;}}else if(sum===3){type='tee';if(!o[3])rot=0;else if(!o[0])rot=1;else if(!o[1])rot=2;else rot=3;}else{type='cross';rot=0;}grid.push({type:type,rot:rot});}
  for(i=0;i<n*n;i++)grid[i].rot=Math.floor(Math.random()*4);return grid;
}
function pGetConnected(){var n=pN,DR=[-1,0,1,0],DC=[0,1,0,-1],visited=[],i;for(i=0;i<n*n;i++)visited.push(false);var q=[0];visited[0]=true;while(q.length){var cur=q.shift(),r=Math.floor(cur/n),c=cur%n;var conn=pConnects(pGrid[cur].type,pGrid[cur].rot);for(var d=0;d<4;d++){if(!conn[d])continue;var nr=r+DR[d],nc=c+DC[d];if(nr<0||nr>=n||nc<0||nc>=n)continue;var ni=nr*n+nc;if(visited[ni])continue;if(pConnects(pGrid[ni].type,pGrid[ni].rot)[(d+2)%4]){visited[ni]=true;q.push(ni);}}}return visited;}
function pCheckWin(){var c=pGetConnected();for(var i=0;i<pN*pN;i++)if(!c[i])return false;return true;}
function pDraw(){
  var n=pN,cell=Math.floor(BOARD_PX/n),i;pCtx.fillStyle='#fff';pCtx.fillRect(0,0,BOARD_PX,BOARD_PX);pCtx.strokeStyle='#ccc';pCtx.lineWidth=1;for(i=1;i<n;i++){pCtx.beginPath();pCtx.moveTo(i*cell,0);pCtx.lineTo(i*cell,BOARD_PX);pCtx.stroke();pCtx.beginPath();pCtx.moveTo(0,i*cell);pCtx.lineTo(BOARD_PX,i*cell);pCtx.stroke();}
  var connected=pGetConnected();for(i=0;i<n*n;i++){var r=Math.floor(i/n),c=i%n;pDrawPipe(pGrid[i],c*cell,r*cell,cell,connected[i]);}
}
function pDrawPipe(pc,x,y,size,connected){var pad=Math.floor(size*0.06);var cx=x+Math.floor(size/2),cy=y+Math.floor(size/2);var thick=Math.floor(size*0.26),halfT=Math.floor(thick/2);var conn=pConnects(pc.type,pc.rot);var color=connected?'#111':'#aaa',bg='#efefef';pCtx.fillStyle=bg;pCtx.fillRect(x+pad,y+pad,size-pad*2,size-pad*2);pCtx.fillStyle=color;if(conn[0])pCtx.fillRect(cx-halfT,y+pad,thick,cy-(y+pad));if(conn[1])pCtx.fillRect(cx,cy-halfT,(x+size-pad)-cx,thick);if(conn[2])pCtx.fillRect(cx-halfT,cy,thick,(y+size-pad)-cy);if(conn[3])pCtx.fillRect(x+pad,cy-halfT,cx-(x+pad),thick);pCtx.fillRect(cx-halfT,cy-halfT,thick,thick);if(pc.type==='end'){var capR=Math.floor(thick*0.75);pCtx.fillStyle=color;pCtx.beginPath();pCtx.arc(cx,cy,capR,0,Math.PI*2);pCtx.fill();pCtx.fillStyle=bg;pCtx.beginPath();pCtx.arc(cx,cy,Math.floor(capR*0.45),0,Math.PI*2);pCtx.fill();}}
function pOnClick(e){if(pFinished)return;var rect=pCanvas.getBoundingClientRect();var px=(e.clientX-rect.left)*(1000/(rect.right-rect.left));var py=(e.clientY-rect.top)*(1000/(rect.bottom-rect.top));var cell=Math.floor(BOARD_PX/pN);var c=Math.floor(px/cell),r=Math.floor(py/cell);if(r<0||r>=pN||c<0||c>=pN)return;if(!pStarted){pStarted=true;pTimerID=setInterval(function(){pTimerSec++;pUpdateTimer();},1000);}pGrid[r*pN+c].rot=(pGrid[r*pN+c].rot+1)%4;pDraw();if(pCheckWin()){pFinished=true;clearInterval(pTimerID);var m=Math.floor(pTimerSec/60),s=pTimerSec%60;pShowWin('HOAN THANH!',(m>0?m+' phut ':'')+( s<10?'0':'')+s+' giay');pDraw();}}
function pUpdateTimer(){var m=Math.floor(pTimerSec/60),s=pTimerSec%60;document.getElementById('pp-timer').textContent=(m<10?'0':'')+m+':'+(s<10?'0':'')+s;}
function pShowWin(l1,l2){document.getElementById('pp-win-box').innerHTML=l1+'<br>'+l2;document.getElementById('pp-overlay').className='show';}
function pSetLevel(n){pLevel=n;var lv=[4,5,6];for(var i=0;i<lv.length;i++){var el=document.getElementById('pp-lvl-'+lv[i]);if(el)el.className='pp-hbtn'+(lv[i]===n?' active':'');}pNewGame();}
function pNewGame(){clearInterval(pTimerID);pN=pLevel;pTimerSec=0;pFinished=false;pStarted=false;pUpdateTimer();pGrid=pGenerate(pN);document.getElementById('pp-overlay').className='';pDraw();}
function ppResize(){
  var vw=window.innerWidth||document.documentElement.clientWidth;
  var vh=gPanelH();
  var wrap=document.getElementById('pp-wrap');
  var hdr=PANEL.querySelector('.pp-header');
  var hdrH=hdr?hdr.offsetHeight:44;var gap=4;var totalLogH=1000+hdrH+gap;
  var isPortrait=vh>=vw;var scaleW=isPortrait?(vw*0.95)/1000:vw/1000;var scaleH=vh/totalLogH;var scale=Math.min(scaleW,scaleH);
  var scaledW=Math.floor(1000*scale);var offX=Math.floor((vw-scaledW)/2);
  wrap.style.webkitTransform='scale('+scale+')';wrap.style.transform='scale('+scale+')';wrap.style.webkitTransformOrigin='top left';wrap.style.transformOrigin='top left';wrap.style.position='absolute';wrap.style.left=offX+'px';wrap.style.top='0px';
}
pCanvas=document.getElementById('pipes-canvas');pCtx=pCanvas.getContext('2d');
pCanvas.addEventListener('click',pOnClick,false);
pCanvas.addEventListener('touchend',function(e){e.preventDefault();if(e.changedTouches&&e.changedTouches.length>0){var t=e.changedTouches[0];pOnClick({clientX:t.clientX,clientY:t.clientY});}},false);
window.pSetLevel=pSetLevel;window.pNewGame=pNewGame;window.ppResize=ppResize;window.ppDraw=pDraw;
/* Pipes is lazy-init — started from gTab('pp') calling ppResize(); pNewGame() */
})();
