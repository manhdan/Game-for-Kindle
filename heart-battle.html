<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, minimum-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Heart Battle</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }

html, body {
  background: #fff;
  color: #000;
  font-family: Georgia, 'Times New Roman', serif;
  -webkit-user-select: none;
  user-select: none;
  overflow: hidden;
  width: 100%;
  height: 100%;
  -webkit-text-size-adjust: 100%;
}

/* wrap = 1006px, border:3px, nội dung = 1000px */
#wrap {
  position: absolute;
  left: 0; top: 0;
  width: 1006px;
  border: 3px solid #000;
  -webkit-transform-origin: 0 0;
  transform-origin: 0 0;
}

/* ═══════════════ TOP BAR ═══════════════ */
/* 4×sz-btn(125px) + timer(200px) + Reset(150px) + NEW(150px) = 1000px */
#top-bar {
  display: block;
  overflow: hidden;
  width: 1000px;
  border-bottom: 4px solid #000;
}

.sz-btn {
  float: left;
  width: 125px;
  text-align: center;
  font-family: Georgia, serif;
  font-size: 0.85rem;
  font-weight: bold;
  cursor: pointer;
  border-right: 3px solid #000;
  background: #fff; color: #000;
  border-top: none; border-bottom: none; border-left: none;
  padding: 0;
}
.sz-btn.active { background: #000; color: #fff; }
.sz-btn:active { opacity: 0.7; }

#d-timer-wrap {
  float: left;
  width: 200px;
  text-align: center;
  border-right: 3px solid #000;
}
.t-value {
  font-size: 1.2rem;
  font-weight: bold;
  font-family: 'Courier New', monospace;
}

.top-btn {
  float: left;
  width: 150px;
  text-align: center;
  font-family: Georgia, serif;
  font-size: 0.85rem;
  font-weight: bold;
  text-transform: uppercase;
  letter-spacing: 1px;
  cursor: pointer;
  border-right: 3px solid #000;
  border-top: none; border-bottom: none; border-left: none;
  padding: 0;
  background: #000; color: #fff;
}
.top-btn:active { background: #444; }
.top-btn:last-child { border-right: none; }

/* ═══════════════ BOARD ═══════════════ */
#board-outer {
  position: relative;
  width: 1000px;
}

#hb-board {
  position: absolute;
  left: 0; top: 0;
  width: 1000px;
}

/* Grid region border overlay */
#hb-frame {
  position: absolute;
  pointer-events: none;
}

/* Each cell */
.hb-cell {
  position: absolute;
  background: #fff;
  cursor: pointer;
  overflow: hidden;
}
.hb-cell:active { opacity: 0.7; }

/* Region borders drawn via JS canvas overlay */
#hb-canvas {
  position: absolute;
  left: 0; top: 0;
  pointer-events: none;
}

/* Heart symbol inside cell */
.hb-heart {
  position: absolute;
  left: 0; top: 0;
  width: 100%;
  height: 100%;
  display: block;
  text-align: center;
  font-size: 1rem; /* overridden by JS */
  line-height: 1;
  color: #000;
  pointer-events: none;
}

/* No X mark — only 2 states: empty and heart */

/* All cells white */

/* ═══════════════ WIN OVERLAY ═══════════════ */
#win-overlay {
  display: none;
  position: absolute;
  left: 0; top: 0;
  width: 1000px;
  background: transparent;
  text-align: center;
}
#win-overlay.show { display: block; }

#win-box {
  display: inline-block;
  background: #fff;
  color: #000;
  padding: 40px 60px;
  font-size: 1.6rem;
  font-weight: bold;
  font-family: Georgia, serif;
  line-height: 1.5;
  cursor: pointer;
}
#win-box .win-sub {
  display: block;
  font-size: 0.95rem;
  font-weight: normal;
  margin-top: 10px;
  letter-spacing: 1px;
}
</style>
</head>
<body>

<div id="wrap">
  <div id="top-bar">
    <div class="sz-btn active" id="sz-5"  onclick="hSetSize(5)">5×5</div>
    <div class="sz-btn"        id="sz-6"  onclick="hSetSize(6)">6×6</div>
    <div class="sz-btn"        id="sz-8"  onclick="hSetSize(8)">8×8</div>
    <div class="sz-btn"        id="sz-10" onclick="hSetSize(10)">10×10</div>
    <div id="d-timer-wrap"><span class="t-value" id="d-timer">00:00</span></div>
    <div class="top-btn" onclick="hReset()">Reset</div>
    <div class="top-btn" onclick="hNewGame()">NEW</div>
  </div>

  <div id="board-outer">
    <div id="hb-board"></div>
    <canvas id="hb-canvas"></canvas>
    <div id="win-overlay" onclick="hNewGame()">
      <div id="win-box">
        <span id="win-msg">Mission complete!</span>
        <span class="win-sub" id="win-time"></span>
        <span class="win-sub"> </span>
      </div>
    </div>
  </div>
</div>

<script>
/* ═══════════════════════════════════════════════════
   HEART BATTLE  (Star Battle variant)  –  ES5, Kindle PPW3
   Rules:
   - Place exactly K hearts per row, per column, per region
   - Hearts may not touch each other (including diagonals)
   - K = difficulty level (1 for easy, 2 for medium, 3 for hard)
   ═══════════════════════════════════════════════════ */

var BAR_H    = 56;
var DESIGN_W = 1006;
var DESIGN_H = BAR_H + 1000;

/* Grid size and internal difficulty (hearts per row/col/region) */
var CUR_SIZE = 5;
var CUR_K    = 1;  /* hearts per line/region — increases with wins */
var WIN_COUNT = 0; /* track wins for difficulty progression */

var N = 5;         /* current grid dimension */
var REGIONS  = []; /* flat array [N*N], value = region index 0..N-1 */
var STATE    = []; /* 0=empty, 1=heart, 2=marked(X) */
var SOLUTION = []; /* 1=heart, 0=empty */
var DONE     = false;
var TSEC     = 0, TID = null, TRUN = false;
var CELL_SZ  = 0, OFF_X = 0, OFF_Y = 0;

/* ── layout / scale ─────────────────────────────── */
function applyScale() {
  var vw = window.innerWidth  || document.documentElement.clientWidth  || 768;
  var vh = window.innerHeight || document.documentElement.clientHeight || 1024;
  var isPortrait = vh >= vw;
  var scaleW = isPortrait ? (vw * 0.95) / DESIGN_W : vw / DESIGN_W;
  var scaleH = vh / (DESIGN_H + 6);
  var s = scaleW < scaleH ? scaleW : scaleH;
  var wrap = document.getElementById('wrap');
  wrap.style.width  = DESIGN_W + 'px';
  wrap.style.height = (DESIGN_H + 6) + 'px';
  wrap.style.webkitTransform = 'scale(' + s + ')';
  wrap.style.transform       = 'scale(' + s + ')';
  wrap.style.webkitTransformOrigin = 'top left';
  wrap.style.transformOrigin       = 'top left';
  var scaledW = Math.floor(DESIGN_W * s);
  var offX = Math.floor((vw - scaledW) / 2);
  if (offX < 0) offX = 0;
  wrap.style.left = offX + 'px';
  wrap.style.top  = '0px';
}

function applyBarHeight() {
  var bh = BAR_H;
  document.getElementById('top-bar').style.height = bh + 'px';
  var i, els;
  els = document.getElementsByClassName('sz-btn');
  for (i = 0; i < els.length; i++) {
    els[i].style.height     = bh + 'px';
    els[i].style.lineHeight = (bh - 4) + 'px';
  }
  var tw = document.getElementById('d-timer-wrap');
  tw.style.height = bh + 'px';
  tw.style.lineHeight = bh + 'px';
  els = document.getElementsByClassName('top-btn');
  for (i = 0; i < els.length; i++) {
    els[i].style.height     = bh + 'px';
    els[i].style.lineHeight = (bh - 4) + 'px';
  }
}

/* ── timer ───────────────────────────────────────── */
function updTimer() {
  var m = Math.floor(TSEC / 60), s = TSEC % 60;
  var el = document.getElementById('d-timer');
  if (el) el.textContent = (m < 10 ? '0' : '') + m + ':' + (s < 10 ? '0' : '') + s;
}
function startTimer() {
  if (TRUN) return;
  TRUN = true;
  TID = setInterval(function () { TSEC++; updTimer(); }, 1000);
}

/* ── Puzzle generation ───────────────────────────── */

/* Generate N connected regions of size N using flood-fill growth */
function generateRegions(n) {
  var regions = [];
  var i, r, c, ri;
  for (i = 0; i < n * n; i++) regions.push(-1);

  /* Place one seed per region */
  var seeds = [], used = {};
  while (seeds.length < n) {
    var idx = Math.floor(Math.random() * n * n);
    if (!used[idx]) { used[idx] = true; seeds.push(idx); }
  }
  for (ri = 0; ri < n; ri++) regions[seeds[ri]] = ri;

  /* Grow regions: repeatedly try to expand each region into adjacent unassigned cells */
  var changed = true;
  var maxIter = n * n * 4;
  while (changed && maxIter-- > 0) {
    changed = false;
    /* shuffle region order each iteration */
    var order = [];
    for (ri = 0; ri < n; ri++) order.push(ri);
    for (ri = n - 1; ri > 0; ri--) {
      var j = Math.floor(Math.random() * (ri + 1));
      var tmp = order[ri]; order[ri] = order[j]; order[j] = tmp;
    }
    for (var oi = 0; oi < n; oi++) {
      ri = order[oi];
      /* find all cells of this region */
      var cells = [];
      for (i = 0; i < n * n; i++) if (regions[i] === ri) cells.push(i);
      /* try to expand */
      var DR = [-1, 0, 1, 0], DC = [0, 1, 0, -1];
      for (var ci = 0; ci < cells.length; ci++) {
        r = Math.floor(cells[ci] / n); c = cells[ci] % n;
        var dirs = [0, 1, 2, 3];
        for (var di = 3; di > 0; di--) {
          var dj = Math.floor(Math.random() * (di + 1));
          var dt = dirs[di]; dirs[di] = dirs[dj]; dirs[dj] = dt;
        }
        for (var di2 = 0; di2 < 4; di2++) {
          var nr = r + DR[dirs[di2]], nc = c + DC[dirs[di2]];
          if (nr < 0 || nr >= n || nc < 0 || nc >= n) continue;
          var ni = nr * n + nc;
          if (regions[ni] !== -1) continue;
          regions[ni] = ri;
          changed = true;
        }
      }
    }
  }
  /* Fill any remaining unassigned cells */
  for (i = 0; i < n * n; i++) {
    if (regions[i] === -1) {
      r = Math.floor(i / n); c = i % n;
      var DR2 = [-1, 0, 1, 0], DC2 = [0, 1, 0, -1];
      for (var d = 0; d < 4; d++) {
        var nr2 = r + DR2[d], nc2 = c + DC2[d];
        if (nr2 >= 0 && nr2 < n && nc2 >= 0 && nc2 < n && regions[nr2 * n + nc2] !== -1) {
          regions[i] = regions[nr2 * n + nc2]; break;
        }
      }
      if (regions[i] === -1) regions[i] = 0;
    }
  }
  return regions;
}

/* Place K non-touching hearts: 1 per row, 1 per col, 1 per region */
function placeSolution(n, regions, k) {
  var sol = [];
  var i;
  for (i = 0; i < n * n; i++) sol.push(0);

  /* Backtracking: place hearts row by row */
  var rowHearts  = [];  /* hearts placed so far per row */
  var colHearts  = [];  /* per col */
  var regHearts  = [];  /* per region */
  for (i = 0; i < n; i++) { rowHearts.push(0); colHearts.push(0); regHearts.push(0); }

  /* Track which cells are "blocked" by adjacency */
  var blocked = [];
  for (i = 0; i < n * n; i++) blocked.push(0);

  function canPlace(r, c) {
    if (rowHearts[r] >= k) return false;
    if (colHearts[c] >= k) return false;
    if (regHearts[regions[r * n + c]] >= k) return false;
    if (blocked[r * n + c]) return false;
    return true;
  }

  function block(r, c, delta) {
    var DR = [-1, -1, -1, 0, 0, 1, 1, 1];
    var DC = [-1, 0,  1, -1, 1, -1, 0, 1];
    for (var d = 0; d < 8; d++) {
      var nr = r + DR[d], nc = c + DC[d];
      if (nr >= 0 && nr < n && nc >= 0 && nc < n) blocked[nr * n + nc] += delta;
    }
  }

  /* Place hearts cell by cell in random order within rows */
  function solve(r, heartsInRow) {
    if (r === n) {
      /* check all rows/cols/regions have exactly k */
      for (var x = 0; x < n; x++) {
        if (rowHearts[x] !== k || colHearts[x] !== k || regHearts[x] !== k) return false;
      }
      return true;
    }
    if (heartsInRow === k) return solve(r + 1, 0);

    /* Try columns in random order */
    var cols = [];
    for (var ci = 0; ci < n; ci++) cols.push(ci);
    for (var ci2 = n - 1; ci2 > 0; ci2--) {
      var cj = Math.floor(Math.random() * (ci2 + 1));
      var ct = cols[ci2]; cols[ci2] = cols[cj]; cols[cj] = ct;
    }

    for (var ci3 = 0; ci3 < n; ci3++) {
      var c = cols[ci3];
      if (!canPlace(r, c)) continue;
      /* place */
      sol[r * n + c] = 1;
      rowHearts[r]++; colHearts[c]++; regHearts[regions[r * n + c]]++;
      block(r, c, 1);
      if (solve(r, heartsInRow + 1)) return true;
      /* undo */
      sol[r * n + c] = 0;
      rowHearts[r]--; colHearts[c]--; regHearts[regions[r * n + c]]--;
      block(r, c, -1);
    }
    return false;
  }

  /* Try up to 10 times with different region configs */
  for (var attempt = 0; attempt < 10; attempt++) {
    for (i = 0; i < n; i++) { rowHearts[i] = 0; colHearts[i] = 0; regHearts[i] = 0; }
    for (i = 0; i < n * n; i++) { sol[i] = 0; blocked[i] = 0; }
    if (solve(0, 0)) return sol;
  }
  return null;
}

function generatePuzzle(n, k) {
  var maxAttempts = 20, attempt, regions, sol;
  for (attempt = 0; attempt < maxAttempts; attempt++) {
    regions = generateRegions(n);
    sol = placeSolution(n, regions, k);
    if (sol) return { regions: regions, solution: sol };
  }
  /* fallback: k=1 */
  for (attempt = 0; attempt < maxAttempts; attempt++) {
    regions = generateRegions(n);
    sol = placeSolution(n, regions, 1);
    if (sol) return { regions: regions, solution: sol };
  }
  return null;
}

/* ── Render ──────────────────────────────────────── */
function render() {
  var board  = document.getElementById('hb-board');
  var canvas = document.getElementById('hb-canvas');
  board.innerHTML = '';

  var BW = 1000;
  var cellSz = Math.floor(BW / N);
  CELL_SZ = cellSz;

  var totalW = cellSz * N;
  var totalH = cellSz * N;
  OFF_X = Math.floor((BW - totalW) / 2);
  OFF_Y = Math.floor((BW - totalH) / 2);
  if (OFF_X < 0) OFF_X = 0;
  if (OFF_Y < 0) OFF_Y = 0;

  var heartSize = Math.floor(cellSz * 0.55);
  var heartTop  = Math.floor((cellSz - heartSize) / 2);

  /* Create cells */
  var r, c, idx;
  for (r = 0; r < N; r++) {
    for (c = 0; c < N; c++) {
      idx = r * N + c;
      var cell = document.createElement('div');
      var reg  = REGIONS[idx];
      var st   = STATE[idx];
      var cls  = 'hb-cell';
      cell.className = cls;
      cell.style.left   = (OFF_X + c * cellSz) + 'px';
      cell.style.top    = (OFF_Y + r * cellSz) + 'px';
      cell.style.width  = cellSz + 'px';
      cell.style.height = cellSz + 'px';

      if (st === 1) {
        var heart = document.createElement('span');
        heart.className = 'hb-heart';
        heart.style.fontSize   = heartSize + 'px';
        heart.style.lineHeight = cellSz + 'px';
        /* 8x8 và 10x10 dùng ★ (U+2605), các kích thước khác dùng ❤ */
        heart.textContent = (N >= 8) ? '\u2605' : '\u2764';
        cell.appendChild(heart);
      }

      (function (rr, cc) {
        cell.onclick = function (e) { hCellClick(rr, cc, e); };
        cell.oncontextmenu = function (e) { e.preventDefault(); hCellRightClick(rr, cc); return false; };
      })(r, c);

      board.appendChild(cell);
    }
  }

  /* Canvas for region borders + thin grid lines */
  canvas.width  = BW;
  canvas.height = BW;
  canvas.style.width  = BW + 'px';
  canvas.style.height = BW + 'px';
  var ctx = canvas.getContext('2d');
  ctx.clearRect(0, 0, BW, BW);

  /* Thin grid lines */
  ctx.strokeStyle = '#ccc';
  ctx.lineWidth = 1;
  for (r = 0; r <= N; r++) {
    ctx.beginPath();
    ctx.moveTo(OFF_X, OFF_Y + r * cellSz);
    ctx.lineTo(OFF_X + N * cellSz, OFF_Y + r * cellSz);
    ctx.stroke();
  }
  for (c = 0; c <= N; c++) {
    ctx.beginPath();
    ctx.moveTo(OFF_X + c * cellSz, OFF_Y);
    ctx.lineTo(OFF_X + c * cellSz, OFF_Y + N * cellSz);
    ctx.stroke();
  }

  /* Thick region borders */
  ctx.strokeStyle = '#000';
  ctx.lineWidth = Math.max(2, Math.floor(cellSz * 0.06));
  var lw2 = ctx.lineWidth / 2;
  for (r = 0; r < N; r++) {
    for (c = 0; c < N; c++) {
      var reg0 = REGIONS[r * N + c];
      var x0 = OFF_X + c * cellSz, y0 = OFF_Y + r * cellSz;
      /* Right border */
      if (c === N - 1 || REGIONS[r * N + c + 1] !== reg0) {
        ctx.beginPath();
        ctx.moveTo(x0 + cellSz, y0);
        ctx.lineTo(x0 + cellSz, y0 + cellSz);
        ctx.stroke();
      }
      /* Bottom border */
      if (r === N - 1 || REGIONS[(r + 1) * N + c] !== reg0) {
        ctx.beginPath();
        ctx.moveTo(x0, y0 + cellSz);
        ctx.lineTo(x0 + cellSz, y0 + cellSz);
        ctx.stroke();
      }
      /* Left border */
      if (c === 0 || REGIONS[r * N + c - 1] !== reg0) {
        ctx.beginPath();
        ctx.moveTo(x0, y0);
        ctx.lineTo(x0, y0 + cellSz);
        ctx.stroke();
      }
      /* Top border */
      if (r === 0 || REGIONS[(r - 1) * N + c] !== reg0) {
        ctx.beginPath();
        ctx.moveTo(x0, y0);
        ctx.lineTo(x0 + cellSz, y0);
        ctx.stroke();
      }
    }
  }

  /* Outer border */
  ctx.lineWidth = 3;
  ctx.strokeStyle = '#000';
  ctx.strokeRect(OFF_X, OFF_Y, N * cellSz, N * cellSz);

  /* Update board-outer and overlay heights */
  var boardH = OFF_Y * 2 + N * cellSz;
  var outer = document.getElementById('board-outer');
  outer.style.height = boardH + 'px';
  board.style.height = boardH + 'px';
  canvas.style.top = '0px';

  var overlay = document.getElementById('win-overlay');
  overlay.style.height = boardH + 'px';
  var box = document.getElementById('win-box');
  box.style.marginTop = Math.floor((boardH - 220) / 2) + 'px';

  DESIGN_H = BAR_H + boardH;
  applyScale();
}

/* ── Cell interaction ────────────────────────────── */
function hCellClick(r, c) {
  if (DONE) return;
  startTimer();
  var idx = r * N + c;
  /* Toggle: empty ↔ heart */
  STATE[idx] = STATE[idx] === 1 ? 0 : 1;
  render();
  if (STATE[idx] === 1) checkWin();
}

function hCellRightClick(r, c) {
  /* Same as left click in 2-state mode */
  hCellClick(r, c);
}

/* ── Win check ───────────────────────────────────── */
function checkWin() {
  var r, c, i, idx;
  /* Check all hearts match solution */
  for (i = 0; i < N * N; i++) {
    if (SOLUTION[i] === 1 && STATE[i] !== 1) return;
    if (SOLUTION[i] === 0 && STATE[i] === 1) return;
  }
  /* Win! */
  clearInterval(TID); DONE = true;
  WIN_COUNT++;
  var m = Math.floor(TSEC / 60), s2 = TSEC % 60;
  var s2s = (s2 < 10 ? '0' : '') + s2;
  var tStr = (m > 0 ? m + ' min ' : '') + s2s + ' sec';
  var msgs  = ['Victory!', 'Mission complete!', 'Well done!', 'You made it!', 'Great job!'];
  var times = [
    'Challenge cleared in ' + tStr,
    'Completed in ' + tStr,
    'You finished in ' + tStr,
    'Time: ' + tStr,
    'Finished in ' + tStr,
    'Cleared in ' + tStr
  ];
  document.getElementById('win-msg').textContent  = msgs[Math.floor(Math.random() * msgs.length)];
  document.getElementById('win-time').textContent = times[Math.floor(Math.random() * times.length)];
  document.getElementById('win-overlay').className = 'show';
  render();
}

/* ── Game control ────────────────────────────────── */
function hSetSize(sz) {
  CUR_SIZE = sz;
  WIN_COUNT = 0;  /* reset difficulty progression when changing size */
  CUR_K = 1;
  var sizes = [5, 6, 8, 10];
  for (var i = 0; i < sizes.length; i++) {
    var el = document.getElementById('sz-' + sizes[i]);
    if (el) el.className = 'sz-btn' + (sizes[i] === sz ? ' active' : '');
  }
  hNewGame();
}

function hNewGame() {
  clearInterval(TID);
  TSEC = 0; TRUN = false; DONE = false;
  updTimer();
  document.getElementById('win-overlay').className = '';

  N = CUR_SIZE;

  /* Difficulty progression: K increases with wins (hidden from UI)
     Easy=1, Medium=2 (after 1 win), Hard=3 (after 3 wins)
     K capped at floor(N/3) to keep puzzle solvable */
  var maxK = Math.floor(N / 3);
  if (maxK < 1) maxK = 1;
  if (WIN_COUNT === 0)      CUR_K = 1;
  else if (WIN_COUNT <= 2)  CUR_K = Math.min(2, maxK);
  else                      CUR_K = Math.min(3, maxK);

  /* Generate puzzle */
  var puzzle = generatePuzzle(N, CUR_K);
  if (!puzzle) {
    /* fallback */
    CUR_K = 1;
    puzzle = generatePuzzle(N, 1);
  }

  REGIONS  = puzzle.regions;
  SOLUTION = puzzle.solution;
  STATE = [];
  for (var i = 0; i < N * N; i++) STATE.push(0);

  render();
}

function hReset() {
  if (DONE) { hNewGame(); return; }
  clearInterval(TID);
  TSEC = 0; TRUN = false; DONE = false;
  updTimer();
  document.getElementById('win-overlay').className = '';
  for (var i = 0; i < N * N; i++) STATE[i] = 0;
  render();
}

/* context menu disable */
if (document.addEventListener) {
  document.addEventListener('contextmenu', function (e) { e.preventDefault(); return false; }, false);
}

/* ── Init ────────────────────────────────────────── */
applyBarHeight();
hNewGame();

if (window.addEventListener) {
  window.addEventListener('resize', applyScale, false);
  window.addEventListener('orientationchange', function () { setTimeout(applyScale, 100); }, false);
}
</script>
</body>
</html>
